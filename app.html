<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Masterpiece & Artist</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Masterpiece">
<meta name="theme-color" content="#0a0a0e">
<style>
:root{
  --bg:#0a0a0e; --bg2:#111116; --bg3:#18181f; --card:#1c1c26;
  --border:#28283a; --text:#e8e8f0; --text2:#8888aa; --text3:#44445a;
  --accent:#a78bfa; --accent2:#7c3aed; --gold:#f59e0b;
  --green:#4ade80; --blue:#60a5fa; --orange:#fb923c; --red:#f87171;
  --r:14px; --ht:56px; --nb:66px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;}
body{padding-top:calc(var(--ht)+var(--st));padding-bottom:calc(var(--nb)+var(--sb));overflow-y:auto;overscroll-behavior:none;}
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:calc(var(--ht)+var(--st));padding-top:var(--st);
  background:rgba(10,10,14,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding-left:18px;padding-right:18px;gap:8px;}
.hdr-logo{font-size:1.05rem;font-weight:900;letter-spacing:-.3px;}
.hdr-logo .m{color:var(--accent);} .hdr-logo .a{color:var(--gold);}
.hdr-badge{margin-left:auto;font-size:.68rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:calc(var(--nb)+var(--sb));padding-bottom:var(--sb);
  background:rgba(10,10,14,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;color:var(--text2);cursor:pointer;gap:3px;padding:6px 0;}
.nb.on{color:var(--accent);} .nb-i{font-size:1.2rem;line-height:1;} .nb-l{font-size:.58rem;font-weight:600;}
.tab{display:none;} .tab.on{display:block;}
.sec-title{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase;padding:0 16px;margin:18px 0 10px;}
.hero{margin:16px;padding:22px 20px;background:linear-gradient(135deg,#1a0e38,#0e1a30,#0a0a14);border:1px solid var(--border);border-radius:18px;position:relative;overflow:hidden;}
.hero-greeting{font-size:.72rem;color:var(--text2);margin-bottom:6px;}
.hero-title{font-size:1.2rem;font-weight:900;line-height:1.4;margin-bottom:14px;}
.hero-title .hl{color:var(--accent);}
.hero-stats{display:flex;} .hs{flex:1;text-align:center;border-right:1px solid var(--border);}
.hs:last-child{border-right:none;} .hs-num{font-size:1.35rem;font-weight:900;color:var(--accent);} .hs-label{font-size:.6rem;color:var(--text2);margin-top:2px;}
.today-card{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:0;cursor:pointer;overflow:hidden;}
.today-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--bg3);}
.today-body{padding:14px 16px;}
.today-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.today-label{font-size:.66rem;font-weight:700;color:var(--gold);letter-spacing:.5px;}
.today-refresh{margin-left:auto;font-size:.72rem;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.today-movement{font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.today-title{font-size:1.05rem;font-weight:900;line-height:1.3;margin-bottom:3px;}
.today-artist{font-size:.78rem;color:var(--gold);margin-bottom:8px;}
.today-summary{font-size:.76rem;color:var(--text2);line-height:1.6;}
.qs-input{width:calc(100% - 32px);margin:0 16px;display:block;background:var(--bg3);border:1.5px solid var(--border);border-radius:50px;padding:12px 20px;font-size:.9rem;color:var(--text);outline:none;font-family:inherit;}
.qs-input:focus{border-color:var(--accent);} .qs-input::placeholder{color:var(--text2);}
.frow{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 16px 10px;white-space:nowrap;}
.frow::-webkit-scrollbar{display:none;}
.fchip{display:inline-block;padding:6px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:.73rem;cursor:pointer;margin-right:6px;}
.fchip.on{color:#fff;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;}
.gcard img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--bg3);}
.gcard-info{padding:8px 9px;}
.gcard-title{font-size:.76rem;font-weight:700;line-height:1.3;}
.gcard-sub{font-size:.66rem;color:var(--accent);margin-top:3px;}
.plist{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.prow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer;}
.prow img{width:50px;height:50px;border-radius:50%;object-fit:cover;object-position:top;background:var(--bg3);flex-shrink:0;}
.prow-name{font-size:.86rem;font-weight:700;} .prow-meta{font-size:.7rem;color:var(--text2);margin-top:2px;}
.tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.62rem;font-weight:600;background:var(--bg3);color:var(--text2);margin-top:4px;}
.list-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:.85rem;}
.visit-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.visit-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;}
.vi-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.vi-title{font-size:.85rem;font-weight:700;color:var(--text);flex:1;}
.vi-date{font-size:.68rem;color:var(--text2);white-space:nowrap;}
.vi-museum{font-size:.72rem;color:var(--accent);}
.vi-memo{font-size:.72rem;color:var(--text2);margin-top:4px;}
.timeline-wrap{padding:0 0 24px;}
.era-header{padding:20px 16px 8px;display:flex;align-items:center;gap:10px;}
.era-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.era-label{font-size:.76rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;}
.era-years{font-size:.66rem;color:var(--text2);margin-left:auto;}
.tl-item{margin:0 16px 8px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:10px 12px;cursor:pointer;}
.tl-item.hist{border-left-color:var(--gold);cursor:default;}
.tl-year{font-size:.62rem;font-weight:800;color:var(--accent);}
.tl-item.hist .tl-year{color:var(--gold);}
.tl-name{font-size:.82rem;font-weight:700;margin-top:2px;}
.tl-desc{font-size:.72rem;color:var(--text2);margin-top:3px;line-height:1.5;}
.form-group{margin:0 16px 14px;} .form-label{font-size:.75rem;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:.85rem;color:var(--text);outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--accent);}
textarea.form-input{resize:none;min-height:70px;}
.btn{border:none;border-radius:50px;padding:11px 18px;font-size:.83rem;font-weight:700;cursor:pointer;}
.btn-primary{background:var(--accent2);color:#fff;flex:1;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);flex:1;}
.btn-green{background:rgba(74,222,128,.15);border:1.5px solid var(--green);color:var(--green);flex:1;}
.row{display:flex;gap:8px;margin:0 16px;}
.panel-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:flex-end;}
.panel-bg.on{display:flex;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:86vh;overflow-y:auto;padding:0 18px calc(20px + var(--sb));}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto;}
.panel-img{width:calc(100% + 36px);margin:0 -18px 14px;max-height:260px;object-fit:cover;display:block;background:var(--bg3);}
.panel-mov{font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.panel-title{font-size:1.15rem;font-weight:900;line-height:1.3;margin-bottom:3px;}
.panel-orig{font-size:.75rem;color:var(--text2);margin-bottom:10px;}
.panel-artist{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:12px;cursor:pointer;}
.panel-meta{font-size:.75rem;color:var(--text2);line-height:1.7;background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.panel-sec{margin-bottom:12px;}
.panel-sec-t{font-size:.68rem;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.panel-sec-b{font-size:.8rem;color:var(--text);line-height:1.7;}
.panel-hist{background:var(--bg3);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:9px 11px;margin-top:6px;}
.ppoints{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ppoints li{display:flex;gap:7px;font-size:.77rem;color:var(--text);line-height:1.5;}
.ppoints li::before{content:'•';color:var(--accent);flex-shrink:0;}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.close-btn{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:50px;padding:10px;font-size:.84rem;font-weight:700;color:var(--text);cursor:pointer;margin-top:8px;}
.needs-enrich{background:rgba(245,158,11,.12);border:1px solid var(--gold);border-radius:8px;padding:9px 11px;font-size:.72rem;color:var(--gold);margin-bottom:12px;}
.memo-area{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:.82rem;color:var(--text);outline:none;resize:none;min-height:70px;font-family:inherit;margin-top:8px;}
.toast{position:fixed;bottom:calc(var(--nb)+var(--sb)+12px);left:50%;transform:translateX(-50%) translateY(20px);background:#222230;border:1px solid var(--border);border-radius:50px;padding:10px 20px;font-size:.82rem;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:none;}
.modal-bg.on{display:flex;align-items:flex-end;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 20px calc(20px + var(--sb));}
.modal-title{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:16px;}
.detect-hdr{text-align:center;padding:16px;} .detect-hdr h2{font-size:1rem;font-weight:700;margin-bottom:6px;} .detect-hdr p{font-size:.78rem;color:var(--text2);line-height:1.6;}
.apibox{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin:0 16px 14px;}
.apibox label{font-size:.76rem;color:var(--text2);display:block;margin-bottom:7px;}
.apirow{display:flex;gap:8px;}
.apirow input{flex:1;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;outline:none;font-family:monospace;}
.savebtn{padding:9px 14px;background:var(--accent2);color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;}
.upload-area{margin:0 16px 10px;border:2px dashed var(--border);border-radius:var(--r);padding:34px 16px;text-align:center;cursor:pointer;background:var(--bg2);position:relative;}
.upload-area .uico{font-size:2.2rem;margin-bottom:8px;}
.upload-area h3{font-size:.86rem;font-weight:600;margin-bottom:4px;}
.upload-area p{font-size:.72rem;color:var(--text2);}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.preview-box{margin:0 16px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px;}
.preview-box img{width:100%;max-height:220px;object-fit:contain;border-radius:10px;display:block;background:var(--bg3);margin-bottom:10px;}
.analyze-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent2),#9333ea);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:700;}
.result-box{margin:0 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.hidden{display:none!important;}
.export-btn{margin:16px;width:calc(100% - 32px);padding:11px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:.8rem;cursor:pointer;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo"><span class="m">Masterpiece</span> & <span class="a">Artist</span></div>
  <div class="hdr-badge" id="hdrBadge"></div>
</div>

<div class="bnav">
  <button class="nb on" data-s="home" onclick="switchTab('home',this)"><span class="nb-i">🏠</span><span class="nb-l">홈</span></button>
  <button class="nb" data-s="explore" onclick="switchTab('explore',this)"><span class="nb-i">🎨</span><span class="nb-l">탐색</span></button>
  <button class="nb" data-s="timeline" onclick="switchTab('timeline',this)"><span class="nb-i">📅</span><span class="nb-l">역사</span></button>
  <button class="nb" data-s="log" onclick="switchTab('log',this)"><span class="nb-i">📝</span><span class="nb-l">기록</span></button>
  <button class="nb" data-s="detect" onclick="switchTab('detect',this)"><span class="nb-i">🔍</span><span class="nb-l">감지</span></button>
</div>

<!-- ══════ HOME ══════ -->
<div id="tab-home" class="tab on">
  <div class="hero">
    <div class="hero-greeting">안녕하세요, Sean 👋</div>
    <div class="hero-title">오늘도 <span class="hl">명화</span>와<br>역사를 이어가요.</div>
    <div class="hero-stats" id="heroStats"></div>
  </div>
  <input class="qs-input" id="homeSearch" type="search" placeholder="🔍  작품명, 화가명, 사조로 검색…" oninput="quickSearch(this.value)" autocomplete="off">
  <div id="qsResults"></div>
  <div id="homeDefault">
    <div class="sec-title">오늘의 작품</div>
    <div class="today-card" id="todayCard"></div>
    <div class="sec-title">최근 방문 기록</div>
    <div id="recentVisits"></div>
  </div>
</div>

<!-- ══════ EXPLORE ══════ -->
<div id="tab-explore" class="tab">
  <div class="sec-title" style="margin-top:16px">🖌 화가</div>
  <div class="frow" id="painter-filters"></div>
  <div class="plist" id="painters-list"></div>
  <div class="sec-title">🖼 갤러리</div>
  <div class="grid2" id="gallery-grid"></div>
</div>

<!-- ══════ TIMELINE ══════ -->
<div id="tab-timeline" class="tab">
  <div class="frow" id="timeline-filters" style="margin-top:16px"></div>
  <div class="timeline-wrap" id="timelineWrap"></div>
</div>

<!-- ══════ LOG (방문기록 + 새 작품 추가) ══════ -->
<div id="tab-log" class="tab">
  <div class="sec-title" style="margin-top:16px">방문 기록</div>
  <div id="logContent"></div>
  <div class="sec-title">신규 작품 추가</div>
  <div class="form-group"><label class="form-label">작품명 (한글)</label><input class="form-input" id="add-title-ko" placeholder="예: 별이 빛나는 밤"></div>
  <div class="form-group"><label class="form-label">원제</label><input class="form-input" id="add-title-orig" placeholder="예: The Starry Night"></div>
  <div class="form-group"><label class="form-label">화가명</label><input class="form-input" id="add-artist" placeholder="예: 빈센트 반 고흐"></div>
  <div class="form-group"><label class="form-label">제작 연도</label><input class="form-input" id="add-year" placeholder="예: 1889"></div>
  <div class="form-group"><label class="form-label">미술 사조</label><input class="form-input" id="add-movement" placeholder="예: 후기인상주의"></div>
  <div class="form-group"><label class="form-label">소장 미술관</label><input class="form-input" id="add-museum" placeholder="예: 뉴욕 현대미술관 (MoMA)"></div>
  <div class="form-group"><label class="form-label">작품 설명</label><textarea class="form-input" id="add-summary" rows="3" placeholder="작품에 대한 간략한 설명…"></textarea></div>
  <div class="form-group"><label class="form-label">감상 메모</label><textarea class="form-input" id="add-memo" rows="2" placeholder="개인 감상…"></textarea></div>
  <div class="form-group">
    <label class="form-label">그림 이미지 (사진 촬영 또는 갤러리에서 선택)</label>
    <div class="upload-area" id="addImgArea" style="padding:20px 16px;margin:0" ondragover="onAddImgDragOver(event)" ondragleave="onAddImgDragLeave()" ondrop="onAddImgDrop(event)">
      <input type="file" accept="image/*" id="add-image" onchange="onAddImageSelect(event)">
      <div class="uico" style="font-size:1.6rem;margin-bottom:4px">📷</div>
      <p style="font-size:.74rem">탭해서 사진 선택 · 드래그도 가능</p>
    </div>
    <div id="add-image-preview" style="margin-top:8px"></div>
  </div>
  <div class="row" style="margin-bottom:20px"><button class="btn btn-outline" onclick="clearAddForm()">초기화</button><button class="btn btn-primary" onclick="submitAdd()">추가 ➕</button></div>
  <button class="export-btn" onclick="exportLocalChanges()">📋 내 변경사항 내보내기 (Claude에게 붙여넣어 archive_db.json에 반영)</button>
</div>

<!-- ══════ DETECT ══════ -->
<div id="tab-detect" class="tab">
  <div class="detect-hdr"><h2>🔍 작품 감지</h2><p>미술관 촬영 사진을 업로드하면 Claude가 작품·화가를 식별하고 해설을 제공합니다.</p></div>
  <div class="apibox">
    <label>🔑 Anthropic API Key (이 기기에만 저장됨)</label>
    <div class="apirow"><input type="password" id="apiKeyInput" placeholder="sk-ant-api..." autocomplete="off"><button class="savebtn" onclick="saveApiKey()">저장</button></div>
    <span id="keyStatus" style="font-size:.74rem;margin-top:6px;display:block;"></span>
  </div>
  <div id="upload-section">
    <div class="upload-area" id="uploadArea" ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
      <input type="file" accept="image/*" id="fileInput" onchange="onFileSelect(event)">
      <div class="uico">🖼</div><h3>이미지를 탭하거나 드래그</h3><p>미술관 사진 · JPG / PNG / WEBP</p>
    </div>
  </div>
  <div id="preview-section" class="hidden">
    <div class="preview-box"><img id="previewImg" src="" alt="preview">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeArtwork()">🔍 작품 분석하기</button>
    </div>
  </div>
  <div id="result-section" style="margin-bottom:20px"></div>
</div>

<!-- DETAIL PANEL -->
<div class="panel-bg" id="panelBg" onclick="closePanel(event)"><div class="panel" id="panelBody"></div></div>
<!-- VISIT MODAL -->
<div class="modal-bg" id="visitModal" onclick="closeVisitModal(event)">
  <div class="modal">
    <div class="modal-title">방문 기록 저장</div>
    <div class="form-group" style="margin-left:0;margin-right:0"><label class="form-label">방문 날짜</label><input class="form-input" id="vm-date" type="date"></div>
    <div class="form-group" style="margin-left:0;margin-right:0"><label class="form-label">미술관 / 장소</label><input class="form-input" id="vm-museum"></div>
    <div class="form-group" style="margin-left:0;margin-right:0"><label class="form-label">감상 메모</label><textarea class="form-input" id="vm-memo" rows="3"></textarea></div>

d": "1665년경", "medium": "Oil on canvas", "dimensions": "44.5 × 39 cm", "location": {"museum": "마우리츠하이스 왕립미술관 (Mauritshuis)", "city": "헤이그", "country": "네덜란드", "room": "15번 전시실"}, "movement": "바로크", "description": {"summary": "'네덜란드의 모나리자'라 불리는 걸작. 어두운 배경에서 고개를 돌려 관람자를 바라보는 순간을 포착한 트로니(Tronie, 익명의 인물 습작). 누구인지 알 수 없는 신원과 촉촉한 입술·반짝이는 시선이 수백 년간 관람자를 매료시켜왔다.", "symbolism": "진주는 순수함과 부의 상징. 터키식 두건은 이국적 정취를 더해 당시 유럽에서 유행한 오리엔탈리즘 취향을 반영. 칠흑 같은 배경은 빛을 받은 얼굴을 더욱 부각시킨다.", "technique": "빛의 마술사 페르메이르의 진수 — 진주 귀걸이의 광택을 단 두 개의 붓 터치(흰색 하이라이트·반사광)로 구현. 얇은 글레이징 층으로 피부의 생동감 표현.", "appreciation_points": ["진주 귀걸이가 실제 진주인지 유리 구슬인지 아직도 논란 — 크기와 빛 반사 방식이 진짜 진주와 다르다는 분석", "입술이 살짝 열려 있어 막 무언가를 말하려는 듯한 순간을 포착", "소녀의 정체 — 페르메이르의 딸 마리아, 아니면 후원자 루펜의 딸이라는 설이 공존", "X선 분석으로 처음엔 속눈썹이 그려졌다가 제거됐음이 확인"], "mysteries": []}, "historical_context": {"period": "네덜란드 황금시대 (Dutch Golden Age)", "year_context": "델프트에서 은둔하듯 작업한 페르메이르는 생전 37점의 작품만 남겼다. 사후 200년간 거의 잊혔다가 19세기 미술비평가 토레-뷔르거에 의해 재발견.", "related_events": ["dutch-golden-age"], "social_background": "델프트의 소시민 가정 출신인 페르메이르는 대부분 자신의 집 안에서 빛이 들어오는 창가를 배경으로 작품을 제작. 의뢰인 루펜의 후원이 없었다면 생계 유지도 어려웠을 것."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["바로크", "트로니", "네덜란드", "빛", "황금시대", "페르메이르"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/1665_Girl_with_a_Pearl_Earring.jpg/400px-1665_Girl_with_a_Pearl_Earring.jpg"}, {"id": "third-of-may-1814", "title": {"original": "El tres de mayo de 1808", "ko": "1808년 5월 3일"}, "artist_id": "goya", "year_created": "1814", "medium": "Oil on canvas", "dimensions": "268 × 347 cm", "location": {"museum": "프라도 미술관 (Museo del Prado)", "city": "마드리드", "country": "스페인", "room": "064번 전시실"}, "movement": "낭만주의", "description": {"summary": "나폴레옹 군이 스페인 민중 봉기 참가자들을 처형하는 장면. 근대 전쟁화의 원형으로 평가되며, 마네·피카소에게 직접적 영향을 끼쳤다. 역사상 전쟁의 공포와 잔혹함을 가장 적나라하게 표현한 작품 중 하나.", "symbolism": "흰 셔츠를 입은 남자의 두 팔은 십자가에 못 박힌 예수를 연상시켜 순교를 상징. 손바닥의 성흔(stigmata)도 의도적으로 표현됐다는 해석. 총살부대 병사들은 얼굴이 없어 개인이 아닌 폭력의 기계를 상징.", "technique": "거친 붓 터치와 강렬한 명암 — 빛을 발하는 흰 셔츠가 어둠 속에서 유일한 광원처럼 작용. 즉흥적이고 격정적인 필치가 공포와 절박함을 증폭.", "appreciation_points": ["처형당하는 자들의 얼굴은 공포·체념·저항 등 다양한 감정을 각각 담고 있다", "총살부대의 얼굴 없음 — 익명성은 국가 폭력의 비인간성을 극대화", "빛을 발하는 흰 셔츠 한 점이 전체 화면의 중심 — 희생자의 숭고함", "마네의 '막시밀리안 황제의 처형', 피카소의 '게르니카'에 직접적 영향"], "mysteries": []}, "historical_context": {"period": "나폴레옹 전쟁기", "year_context": "1808년 나폴레옹이 스페인을 침공하고 형 조제프를 왕으로 앉힌다. 마드리드 시민들이 5월 2일 봉기를 일으켰고 이튿날 나폴레옹 군은 시민들을 무차별 처형. 고야는 6년 후 이 장면을 기억에서 재구성해 그렸다.", "related_events": ["napoleonic-wars", "peninsular-war"], "social_background": "고야는 처음에는 계몽주의 이상에 공감하며 나폴레옹을 지지했으나, 전쟁의 참혹함을 목격하고 근본적으로 전환. '전쟁의 참화(Los Desastres de la Guerra)' 판화 연작도 같은 시기 제작."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["낭만주의", "전쟁화", "스페인", "나폴레옹", "반전", "고야"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/El_Tres_de_Mayo%2C_by_Francisco_de_Goya%2C_from_Prado_in_Google_Earth.jpg/800px-El_Tres_de_Mayo%2C_by_Francisco_de_Goya%2C_from_Prado_in_Google_Earth.jpg"}, {"id": "water-lilies-1906", "title": {"original": "Les Nymphéas", "ko": "수련"}, "artist_id": "monet", "year_created": "1896–1926 (연작)", "medium": "Oil on canvas", "dimensions": "다양 (대형 연작 기준 최대 200 × 1275 cm)", "location": {"museum": "오랑주리 미술관 (Musée de l'Orangerie)", "city": "파리", "country": "프랑스", "room": "타원형 전시실 1·2호"}, "movement": "인상주의", "description": {"summary": "모네가 지베르니 자택 정원의 수련 연못을 약 30년에 걸쳐 그린 250여 점의 대연작. 말년 백내장으로 시력이 급격히 저하된 상태에서도 제작을 멈추지 않았다. 오랑주리 미술관의 대형 파노라마 패널(8점)은 모네가 직접 국가에 헌정한 작품.", "symbolism": "수면에 비친 하늘과 구름 — 실제와 반영의 경계를 허물어 현실과 비현실의 경계에 관한 철학적 명상. 고정된 시점 없이 360도를 에워싸는 파노라마는 관람자를 자연 속에 완전히 몰입시킨다.", "technique": "두텁고 자유로운 임파스토(Impasto) 기법 — 말년 작품일수록 형태보다 색채·빛·분위기만 남는다. 물감을 두껍게 쌓아 질감 자체가 빛의 진동처럼 느껴지게 함.", "appreciation_points": ["오랑주리 타원형 방에 들어서면 수면이 방 전체를 에워싸 수중에 있는 듯한 감각", "백내장 진행에 따라 색조가 붉어지고 윤곽이 흐려지는 과정이 연작 전체에 기록됨", "추상표현주의 화가들(폴록, 드 쿠닝)이 수련에서 직접 영감을 받았다고 고백", "지베르니 정원 자체가 모네가 설계한 '살아있는 작품'"], "mysteries": []}, "historical_context": {"period": "벨 에포크 (Belle Époque) ~ 제1차 세계대전", "year_context": "모네는 1차 대전 중에도 지베르니 정원에서 작업을 계속했다. 1918년 종전을 기념해 수련 대작을 국가에 헌정하겠다고 선언. 오랑주리 설치는 모네 사망 직전인 1927년 완성.", "related_events": ["belle-epoque", "world-war-i"], "social_background": "인상주의가 처음엔 조롱받았으나 1880년대 이후 파리 미술계 주류로 자리잡는다. 모네는 말년엔 경제적으로 풍족했지만 아내·아들의 죽음과 시력 악화로 심리적 고통 속에서 작업."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["인상주의", "연작", "프랑스", "자연", "빛", "모네"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg/800px-Claude_Monet_-_Water_Lilies_-_1906%2C_Ryerson.jpg"}, {"id": "starry-night-1889", "title": {"original": "The Starry Night", "ko": "별이 빛나는 밤"}, "artist_id": "van-gogh", "year_created": "1889", "medium": "Oil on canvas", "dimensions": "73.7 × 92.1 cm", "location": {"museum": "뉴욕 현대미술관 (MoMA)", "city": "뉴욕", "country": "미국", "room": "5층 영구 소장품관"}, "movement": "후기인상주의", "description": {"summary": "고흐가 정신병원(생 폴 드 무졸, 생 레미)에 자발적으로 입원 중 창문 밖 새벽 풍경을 보고 그린 작품. 소용돌이치는 하늘과 빛나는 별들, 고요한 마을의 대비가 내면의 격동과 평정 사이 갈등을 표현한다.", "symbolism": "소용돌이치는 하늘 — 고흐 자신의 감정적 격동 표현. 화면 왼편 사이프러스 나무는 당시 묘지 나무로 죽음·영원을 상징. 밝게 빛나는 달과 별은 영적 초월에 대한 열망. 마을 교회의 첨탑은 고향 네덜란드를 그리워하는 마음.", "technique": "터치 하나하나를 눈에 띄게 두껍고 역동적으로 남기는 임파스토 — 하늘의 소용돌이는 실제 대기의 와류 패턴(난류)과 유사하다는 유체역학 연구 결과가 있음.", "appreciation_points": ["2006년 NASA 연구에서 하늘의 소용돌이 패턴이 콜모고로프 난류 방정식과 일치함을 확인", "실제 창문에서 보이지 않는 마을 '생 레미'를 기억과 상상으로 합성해 그렸다", "금성(새벽별)이 오른쪽 위 가장 큰 별로 그려짐 — 천문학적으로 검증 완료", "고흐는 이 그림을 '실패작'으로 여겼다 — 동생 테오에게 보낸 편지에서 실망감 표현"], "mysteries": []}, "historical_context": {"period": "후기 19세기 유럽", "year_context": "고흐는 1888년 가울과의 다툼 끝에 자신의 귀를 자르고 정신과 치료를 받기 시작. 1889년 5월 생 레미 정신병원에 스스로 입원하여 '별이 빛나는 밤'을 포함해 150점 이상을 그렸다.", "related_events": ["post-impressionism-movement", "belle-epoque"], "social_background": "당시 예술계에서 전혀 인정받지 못했던 고흐는 생전 단 1점의 그림을 팔았을 뿐. 정신 질환과 생계 문제로 고통받으며 동생 테오의 경제적 지원에만 의존. 1890년 37세에 생을 마감."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["후기인상주의", "풍경화", "네덜란드", "정신", "별", "고흐"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/800px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg"}, {"id": "kiss-klimt-1908", "title": {"original": "Der Kuss", "ko": "키스"}, "artist_id": "klimt", "year_created": "1907–1908", "medium": "Oil and gold leaf on canvas", "dimensions": "180 × 180 cm", "location": {"museum": "벨베데레 궁전 (Österreichische Galerie Belvedere)", "city": "빈", "country": "오스트리아", "room": "1층 황금 홀"}, "movement": "상징주의·아르누보", "description": {"summary": "금색 광채 속에 서로를 껴안고 키스하는 연인의 모습. 클림트의 '황금 시기' 최고 걸작으로, 빈 분리파(Wiener Secession) 운동의 정수를 담았다. 에로스와 타나토스(사랑과 죽음)의 공존을 표현한다는 해석이 지배적.", "symbolism": "남성의 로브에 그려진 검은 직사각형은 죽음·이성·남성성, 여성의 로브에 그려진 꽃무늬는 생명·감성·여성성을 상징. 두 사람을 감싼 금빛 후광은 사랑의 신성함. 절벽 끝에 서 있는 연인 — 황홀경과 죽음의 경계.", "technique": "실제 금박(Gold leaf) 과 은박 사용 — 비잔틴 모자이크와 일본 화풍에서 영감. 이집트 미술의 정면성과 평면성도 결합. 인물 주변의 배경은 완전히 금색으로 처리해 신성한 초월적 공간감 부여.", "appreciation_points": ["실제 금박이라 조명에 따라 그림이 살아 움직이는 듯 빛난다", "여성의 발 아래 꽃밭 — 실제 절벽 끝에 아슬아슬하게 피어난 꽃들", "남녀 복식 패턴의 대비(직사각형 vs 꽃무늬)가 성별 이분법적 상징체계를 구현", "클림트 자신과 연인 에밀리 플뢰게를 모델로 그렸다는 설이 유력"], "mysteries": []}, "historical_context": {"period": "세기말 빈 (Fin-de-siècle Vienna)", "year_context": "1907년 오스트리아-헝가리 제국의 마지막 전성기. 빈은 프로이트의 정신분석학, 비트겐슈타인의 철학, 쇤베르크의 무조음악 등이 동시에 폭발한 '세기말 문화'의 중심지.", "related_events": ["austro-hungarian-empire", "vienna-secession", "fin-de-siecle"], "social_background": "클림트는 빈 보수 예술계에 반기를 들고 '빈 분리파'를 결성. '예술을 각 시대에, 각 시대에 자유를(Der Zeit ihre Kunst, der Kunst ihre Freiheit)'을 모토로 내걸었다. '키스'는 이 시기 절정의 작품."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["상징주의", "아르누보", "오스트리아", "금박", "사랑", "클림트"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg/600px-The_Kiss_-_Gustav_Klimt_-_Google_Cultural_Institute.jpg"}, {"id": "scream-1893", "title": {"original": "Skrik", "ko": "절규"}, "artist_id": "munch", "year_created": "1893 (총 4개 버전)", "medium": "Oil, tempera, and crayon on cardboard (1893 버전)", "dimensions": "91 × 73.5 cm", "location": {"museum": "노르웨이 국립미술관 (Nasjonalmuseet)", "city": "오슬로", "country": "노르웨이", "room": "2층 19세기관"}, "movement": "표현주의", "description": {"summary": "현대인의 실존적 불안과 공포를 가장 강렬하게 표현한 아이콘. 뭉크 자신의 일기에 '나는 자연의 커다란 절규를 느꼈다'고 기록. 왜곡된 인물과 불꽃처럼 소용돌이치는 하늘이 내면 공포의 가시화.", "symbolism": "양손으로 뺨을 감싸 쥔 해골 같은 얼굴 — 실존적 공포의 보편적 아이콘. 핏빛 노을 — 뭉크가 실제 경험한 비정상적 황혼 (크라카타우 화산 폭발로 인한 대기 현상이라는 설). 다리 위를 걷는 두 친구 — 무심한 세계 앞에 홀로 선 개인.", "technique": "선묘와 색면을 혼합한 독특한 기법 — 파도치는 곡선들이 화면 전체를 뒤덮어 불안감을 극대화. 인물은 배경과 하나로 녹아들어 환경에 압도된 존재감.", "appreciation_points": ["1893·1895년 파스텔 버전·1910·1917년 총 4개 버전 존재 — 각 버전이 뉘앙스 다름", "1893년 원본에 연필로 '미친 사람만이 이걸 그릴 수 있다'는 낙서가 있었으나 뭉크 자신이 쓴 것으로 최근 확인", "2004년 오슬로 미술관에서 무장 강도에 도난당했다가 3개월 후 회수", "이모티콘과 팝 문화의 원조 — 앤디 워홀이 실크스크린으로 재해석"], "mysteries": []}, "historical_context": {"period": "19세기 말 유럽", "year_context": "1890년대 유럽은 산업화·도시화의 급격한 변화로 개인의 소외와 불안이 새로운 사회 문제로 대두. 프로이트의 무의식 개념(1899년)이 등장하기 직전 시기.", "related_events": ["industrialization", "krakatau-eruption-1883"], "social_background": "뭉크는 어린 시절 어머니와 누나를 결핵으로 잃고 평생 죽음과 질병에 대한 공포를 안고 살았다. '절규'를 포함한 '생명의 프리즈(Frieze of Life)' 연작은 사랑·불안·죽음을 주제로 한 자전적 대서사."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["표현주의", "불안", "노르웨이", "현대성", "아이콘", "뭉크"], "archived_date": "2026-06-20"}, {"id": "guernica-1937", "title": {"original": "Guernica", "ko": "게르니카"}, "artist_id": "picasso", "year_created": "1937", "medium": "Oil on canvas", "dimensions": "349 × 776 cm", "location": {"museum": "레이나 소피아 국립미술관 (Museo Reina Sofía)", "city": "마드리드", "country": "스페인", "room": "206.07호"}, "movement": "큐비즘", "description": {"summary": "스페인 내전 중인 1937년 4월 26일, 나치 독일 공군이 스페인 바스크 지방 소도시 게르니카를 무차별 폭격한 사건을 고발하는 반전 걸작. 흑백·회색만으로 공포와 혼돈을 표현해 20세기 최대의 정치적 예술 작품으로 꼽힌다.", "symbolism": "울부짖는 말 — 고통받는 민중. 부러진 칼을 쥔 죽은 병사 — 패배한 저항의 희망. 죽은 아이를 안고 절규하는 어머니 — 전쟁의 최대 피해자. 황소 — 잔인함과 어둠 (파시즘 해석 지배적). 전구 같은 눈의 램프 — 감시·폭격·계몽의 복합 상징.", "technique": "큐비즘의 다시점(Multi-perspective)으로 공포의 순간을 동시다발적으로 표현. 흑·백·회색 3색만 사용 — 당시 신문 사진과 영화의 흑백 이미지를 연상시켜 다큐멘터리적 사실감 부여.", "appreciation_points": ["나치 장교가 피카소의 스튜디오에서 이 그림의 사진을 보고 '당신이 이걸 그렸냐'고 묻자 피카소 '아니오, 당신들이 그렸소'라고 답했다는 일화", "스페인 독재자 프랑코 집권 기간 동안 뉴욕 MoMA에 보관 — '민주주의 스페인이 올 때까지'라는 피카소의 유언대로 1981년 마드리드 귀환", "유엔 안보리 앞 복제본이 걸려 있어 각국 외교관이 전쟁 결정을 내릴 때마다 마주하게 됨", "349×776cm의 초대형 — 실물 앞에 서면 압도감이 다름"], "mysteries": []}, "historical_context": {"period": "스페인 내전 (1936–1939)", "year_context": "1936년 파시스트 프랑코 장군이 공화국 정부에 쿠데타를 일으켜 내전 발발. 히틀러·무솔리니가 프랑코를 지원. 1937년 4월 게르니카 폭격은 민간인 대상 공중폭격의 첫 사례 중 하나.", "related_events": ["spanish-civil-war", "world-war-ii-prelude", "nazi-germany"], "social_background": "피카소는 당시 파리에 망명 중이었으며 스페인 공화국 정부로부터 파리 만국박람회 스페인관 벽화를 의뢰받은 상태. 게르니카 폭격 소식을 듣고 즉각 주제를 바꿔 이 작품을 6주 만에 완성."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["큐비즘", "반전", "스페인", "내전", "정치", "피카소"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/en/7/74/PicassoGuernica.jpg"}, {"id": "persistence-of-memory-1931", "title": {"original": "The Persistence of Memory", "ko": "기억의 지속"}, "artist_id": "dali", "year_created": "1931", "medium": "Oil on canvas", "dimensions": "24 × 33 cm", "location": {"museum": "뉴욕 현대미술관 (MoMA)", "city": "뉴욕", "country": "미국", "room": "5층 영구 소장품관"}, "movement": "초현실주의", "description": {"summary": "녹아 흘러내리는 시계들이 펼쳐진 카탈루냐 해안 풍경. 달리가 카망베르 치즈가 녹는 것을 보다 영감을 받아 2시간 만에 그렸다고 전해진다. 아인슈타인 상대성이론 이후 절대적 시간 개념의 붕괴를 시각화한 작품으로 해석된다.", "symbolism": "흘러내리는 시계 — 고정된 객관적 시간의 해체, 꿈속에서 늘어지는 주관적 시간 경험. 개미에 뒤덮인 시계 — 부패·죽음. 기묘한 생물체(달리 자신의 자화상으로 해석) — 무의식. 배경 카탈루냐 해안 절벽은 달리의 고향 카다케스.", "technique": "초현실주의 특유의 '편집증적 비판 방법(Paranoiac-critical method)' — 몽환적 내용을 사진처럼 정교하고 사실적인 필치로 그려 현실과 비현실의 충돌을 극대화.", "appreciation_points": ["24×33cm의 엽서 크기 — 실물을 보면 의외로 작아서 충격적", "달리는 '녹는 시계는 카망베르 치즈가 연상을 불러일으킨 것'이라 설명했으나 프로이트의 무의식 이론과 연결 짓는 해석이 지배적", "1931년 제작 후 3주 만에 갤러리에서 팔렸고 이후 MoMA에 기증", "배경의 카탈루냐 해안은 달리가 평생 떠나지 않으려 했던 고향 — 지도와 대조하면 정확히 일치"], "mysteries": []}, "historical_context": {"period": "전간기 (Interwar Period), 1920–1930년대", "year_context": "1931년 유럽은 대공황의 여파로 경제 붕괴·파시즘 부상의 혼란기. 앙드레 브르통의 초현실주의 선언(1924) 이후 파리 예술계를 지배한 무의식 탐구 운동이 절정.", "related_events": ["interwar-period", "great-depression", "einstein-relativity"], "social_background": "달리는 1929년 갈라(엘레나 디아코노바)와 동거를 시작하며 뮤즈와 매니저를 얻는다. 이 시기 초현실주의 그룹의 핵심 멤버로 활동하며 '가장 초현실적인 초현실주의자'로 부상."}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["초현실주의", "시간", "스페인", "무의식", "꿈", "달리"], "archived_date": "2026-06-20", "image": "https://upload.wikimedia.org/wikipedia/en/d/dd/The_Persistence_of_Memory.jpg"}, {"id": "birth-of-venus-1485", "title": {"original": "The Birth of Venus", "ko": "비너스의 탄생"}, "artist_id": "botticelli", "year_created": "1485", "medium": "", "dimensions": "", "location": {"museum": "우피치 미술관, 피렌체", "city": "", "country": "", "room": ""}, "movement": "르네상스", "description": {"summary": "바다 거품에서 태어난 미의 여신 비너스를 묘사한 대표적 르네상스 회화.", "symbolism": "", "technique": "", "appreciation_points": [], "mysteries": []}, "historical_context": {"period": "", "year_context": "", "social_background": ""}, "personal": {"visited": false, "visit_date": null, "museum_visited": null, "memo": ""}, "tags": ["르네상스"], "archived_date": "2026-07-05", "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg/800px-Sandro_Botticelli_-_La_nascita_di_Venere_-_Google_Art_Project_-_edited.jpg", "needs_enrichment": true}, {"id": "primavera-1482", "title": {"original": "Primavera", "ko": "프리마베라 (봄)"}, "artist_id": "botticel d": ["라파엘로", "미켈란젤로", "렘브란트", "카라바조"], "major_works_ids": ["mona-lisa-1503"], "style_characteristics": ["스푸마토", "키아로스쿠로", "과학적 관찰", "인체 해부학"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Leonardo_self_portrait_small.jpg/300px-Leonardo_self_portrait_small.jpg"}, {"id": "rembrandt", "name": {"full": "Rembrandt Harmenszoon van Rijn", "ko": "렘브란트 판 레인"}, "born": "1606-07-15", "died": "1669-10-04", "nationality": "네덜란드 (레이던)", "movement": "바로크", "bio": {"early_life": "레이던 대학을 중퇴하고 화가의 길로 전환. 20대 초반 암스테르담으로 이주해 빠르게 최고의 초상화가로 명성을 얻음.", "career": "1630~40년대 황금기. 야경(1642) 이후 취향 변화와 아내 사스키아의 사망으로 개인적 위기. 자화상을 생애 전반에 걸쳐 100점 이상 그려 내면의 변화를 기록.", "later_life": "파산을 선언하고 가재도구 경매. 말년엔 가난 속에서도 더 깊어진 내면의 그림을 그렸다. 1669년 63세로 빈곤하게 사망.", "personality": "미술품·골동품 수집에 탕진. 아내 사후 하녀 헨드리케와 동거해 종교계 비난. 그러나 말년 작품은 오히려 가장 깊이 있다는 평."}, "influences": ["카라바조", "피테르 라스트만"], "influenced": ["베르메이르", "고야", "들라크루아"], "major_works_ids": ["night-watch-1642"], "style_characteristics": ["키아로스쿠로", "자화상", "집단 초상화", "성서적 주제"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Rembrandt_van_Rijn_-_Self-Portrait_-_Google_Art_Project.jpg/300px-Rembrandt_van_Rijn_-_Self-Portrait_-_Google_Art_Project.jpg"}, {"id": "vermeer", "name": {"full": "Johannes Vermeer", "ko": "요하네스 페르메이르"}, "born": "1632-10-31", "died": "1675-12-15", "nationality": "네덜란드 (델프트)", "movement": "바로크", "bio": {"early_life": "델프트에서 출생. 아버지는 여관과 미술품 거래업을 겸업. 화가 수업 경로 불명 — 렘브란트나 파브리티우스에게 배웠을 것으로 추정.", "career": "생애 대부분을 델프트에서 보내며 약 37점의 작품만 남김. 대부분 자택 2층 앞방에서 창가의 빛을 이용해 그렸다. 카메라 옵스쿠라를 사용했다는 설이 유력.", "later_life": "사후 200년간 거의 잊혀졌다가 19세기 프랑스 미술비평가 토레-뷔르거에 의해 '재발견'. 1675년 43세로 요절, 11명의 자녀와 막대한 빚을 남겼다.", "personality": "과묵하고 내성적. 외부 주문보다 소수 후원자(콜세인 후원가 루펜)에 의존. 작품 당 제작 기간이 수개월~수년에 달할 만큼 느린 작업 속도."}, "influences": ["카라바조", "렘브란트", "카렐 파브리티우스"], "influenced": ["프리드리히", "호퍼", "현대 사진예술"], "major_works_ids": ["girl-pearl-earring-1665"], "style_characteristics": ["빛의 마술", "정밀한 질감", "실내 풍경", "트로니"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Johannes_Vermeer_-_Self-Portrait.jpg/300px-Johannes_Vermeer_-_Self-Portrait.jpg"}, {"id": "goya", "name": {"full": "Francisco José de Goya y Lucientes", "ko": "프란시스코 고야"}, "born": "1746-03-30", "died": "1828-04-16", "nationality": "스페인 (아라곤)", "movement": "낭만주의", "bio": {"early_life": "아라곤 지방 출신. 마드리드와 로마에서 수학. 스페인 왕실 수석 화가로 임명되어 귀족 초상화를 그리며 성공.", "career": "46세에 청각을 완전히 잃음. 나폴레옹 침공 이후 작풍이 근본적으로 전환 — '검은 그림(Black Paintings)' 시리즈, 전쟁 판화 연작 등 어두운 내면으로.", "later_life": "페르디난도 7세의 반동 정치를 피해 1824년 프랑스 보르도로 망명. 1828년 82세에 망명지에서 사망.", "personality": "계몽주의 이상을 지지한 지식인이었으나 전쟁 목격 이후 인간 본성의 잔혹함을 직시. 근대 회화·표현주의·초현실주의의 선구자로 평가."}, "influences": ["벨라스케스", "렘브란트", "티치아노"], "influenced": ["들라크루아", "마네", "피카소"], "major_works_ids": ["third-of-may-1814"], "style_characteristics": ["명암 대비", "사회 비판", "심리적 표현", "자유로운 필치"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Vicente_L%C3%B3pez_Porta%C3%B1a_-_Goya.jpg/300px-Vicente_L%C3%B3pez_Porta%C3%B1a_-_Goya.jpg"}, {"id": "monet", "name": {"full": "Oscar-Claude Monet", "ko": "클로드 모네"}, "born": "1840-11-14", "died": "1926-12-05", "nationality": "프랑스 (파리)", "movement": "인상주의", "bio": {"early_life": "노르망디 해안 도시에서 성장. 외젠 부댕에게 야외 스케치를 배우고, 파리에서 쿠르베·마네의 영향을 받음.", "career": "1874년 '인상: 해돋이'가 전시되며 '인상주의'라는 명칭의 유래가 됨 — 원래 비평가의 조롱이었다. 지베르니에 정착 후 정원을 조성하고 수련 연작에 집중.", "later_life": "백내장으로 시력 악화. 수술 후 자외선 감지 능력이 생겨 그림 색조가 푸르게 변화. 1926년 86세로 지베르니에서 사망.", "personality": "완벽주의자. 기상 조건에 따라 같은 주제를 반복해 그리는 집요함. 수련 연작 말년엔 그림이 만족스럽지 않으면 직접 불태웠다."}, "influences": ["에두아르 마네", "외젠 부댕", "일본 우키요에"], "influenced": ["세잔", "추상표현주의", "미니멀리즘"], "major_works_ids": ["water-lilies-1906"], "style_characteristics": ["빛의 순간 포착", "야외 작업", "색채 분할", "연작"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Claude_Monet_1899_Nadar_crop.jpg/300px-Claude_Monet_1899_Nadar_crop.jpg"}, {"id": "van-gogh", "name": {"full": "Vincent Willem van Gogh", "ko": "빈센트 반 고흐"}, "born": "1853-03-30", "died": "1890-07-29", "nationality": "네덜란드 (줜데르트)", "movement": "후기인상주의", "bio": {"early_life": "목사 집안 출신. 화랑 직원·교사·전도사 등을 전전하다 27세에 화가로 전향. 독학으로 수천 장의 드로잉 연습.", "career": "파리에서 인상주의에 눈뜨고, 아를로 이주해 '남프랑스의 빛'을 찾아 황금기 작품 대거 제작. 고갱과의 갈등 끝에 귀를 자르는 사건 발생.", "later_life": "생 레미 정신병원 입원 중에도 '별이 빛나는 밤' 등 150점 이상 제작. 오베르쉬르우아즈로 이주 후 1890년 37세에 총상으로 사망. 생전 단 1점 판매.", "personality": "강렬한 감정과 불안정한 정신 상태. 동생 테오와의 편지 900통이 현존해 내면 세계를 상세히 알 수 있다. 사후 100년 만에 역대 최고가 화가로."}, "influences": ["렘브란트", "밀레", "일본 우키요에", "쇠라"], "influenced": ["표현주의", "야수파", "현대 미술 전반"], "major_works_ids": ["starry-night-1889"], "style_characteristics": ["역동적 임파스토", "보색 대비", "소용돌이 선묘", "감정의 가시화"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project.jpg/300px-Vincent_van_Gogh_-_Self-Portrait_-_Google_Art_Project.jpg"}, {"id": "klimt", "name": {"full": "Gustav Klimt", "ko": "구스타프 클림트"}, "born": "1862-07-14", "died": "1918-02-06", "nationality": "오스트리아 (빈)", "movement": "상징주의·아르누보", "bio": {"early_life": "빈 공예학교 졸업. 초기엔 아카데미풍 장식 벽화 전문가로 성공. 동생 에른스트의 죽음 이후 화풍이 급격히 변화.", "career": "1897년 '빈 분리파' 창설. 에로티시즘과 금박을 결합한 '황금 시기'로 세계적 명성. 철학·의학·법학 벽화로 빈 대학에서 외설 논란 겪기도.", "later_life": "1차 대전 중에도 활발히 활동하다 1918년 스페인 독감으로 55세에 갑작스럽게 사망. 사망 직전까지 에밀리 플뢰게와 30년간 플라토닉 관계 유지.", "personality": "수줍고 말수 적었으나 여성 편력. 14명 이상의 혼외 자녀가 있었다고 전해짐. 에밀리 플뢰게 외에 평생 동반자 없었음."}, "influences": ["비잔틴 모자이크", "이집트 미술", "일본 우키요에"], "influenced": ["에곤 실레", "오스카 코코슈카", "현대 장식 미술"], "major_works_ids": ["kiss-klimt-1908"], "style_characteristics": ["금박 사용", "장식적 평면성", "에로티시즘", "상징성"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Klimt.jpg/300px-Klimt.jpg"}, {"id": "munch", "name": {"full": "Edvard Munch", "ko": "에드바르 뭉크"}, "born": "1863-12-12", "died": "1944-01-23", "nationality": "노르웨이 (로텐)", "movement": "표현주의", "bio": {"early_life": "어린 시절 어머니·누나를 결핵으로 잃음. 아버지의 극단적 종교적 엄격함 속에서 성장. '병약함·광기·죽음은 내 요람을 지킨 검은 천사'라고 회고.", "career": "파리·베를린을 거치며 고갱·로트레크의 영향. 베를린 전시가 외설 논란으로 강제 폐막됐으나 오히려 표현주의 화가들에게 큰 영향.", "later_life": "1908년 신경쇠약으로 코펜하겐 요양원 입원. 회복 후 오슬로 외곽 에켈리에 은거하며 노르웨이 자연을 소재로 보다 온화한 후기 작업.", "personality": "극심한 불안과 알코올 의존. '나의 고통은 나 자신과 나의 예술에 속한다'며 치료 거부. 80세에 나치 점령 치하 오슬로에서 고독하게 사망."}, "influences": ["고갱", "로트레크", "고흐"], "influenced": ["독일 표현주의", "키르히너", "베크만"], "major_works_ids": ["scream-1893"], "style_characteristics": ["심리적 표현", "강렬한 색채", "소용돌이 선묘", "자전적 주제"]}, {"id": "picasso", "name": {"full": "Pablo Ruiz Picasso", "ko": "파블로 피카소"}, "born": "1881-10-25", "died": "1973-04-08", "nationality": "스페인 (말라가) / 프랑스 거주", "movement": "큐비즘", "bio": {"early_life": "말라가 출신. 10세에 이미 아버지(화가 교사)를 능가. 바르셀로나·마드리드에서 아카데미 교육 후 파리로 이주.", "career": "청색 시기→장밋빛 시기→큐비즘(브라크와 공동 개발)→신고전주의→초현실주의 등 10년마다 화풍을 혁신. 91세까지 현역으로 활동.", "later_life": "2차 대전 중 파리 잔류. 프랑스 공산당 입당(1944). 전후 국제 평화 운동의 아이콘. 1973년 91세 남프랑스에서 사망.", "personality": "어마어마한 생명력과 다산성 — 1만 3500점 이상 제작. 여성 편력으로 악명. '나는 창조하지 않는다, 발견할 뿐이다'는 명언."}, "influences": ["세잔", "이베리아 조각", "아프리카 원시미술"], "influenced": ["현대 미술 전 장르"], "major_works_ids": ["guernica-1937"], "style_characteristics": ["다시점", "형태 해체", "콜라주", "정치적 발언"], "portrait": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Pablo_picasso_1.jpg/300px-Pablo_picasso_1.jpg"}, {"id": "dali", "name": {"full": "Salvador Domingo Felipe Jacinto Dalí i Domènech", "ko": "살바도르 달리"}, "born": "1904-05-11", "died": "1989-01-23", "nationality": "스페인 (카탈루냐)", "movement": "초현실주의", "bio": {"early_life": "카탈루냐의 부유한 공증인 집안 출신. 마드리드 미술학교 재학 중 피카소·미로와 교류. 퇴학 처분 후 파리로.", "career": "1929년 갈라를 만나며 인생의 전환. 브르통의 초현실주의 그룹 합류 후 '편집증적 비판 방법'으로 독보적 위치. 2차 대전 중 미국으로 이주해 상업 활동 활발.", "later_life": "갈라 사망(1982) 후 극도의 우울증. 피게레스의 달리 극장미술관(자신이 설계)에 스스로 거주하다 1989년 84세로 사망, 미술관 지하에 안장.", "personality": "'광기와 천재의 유일한 차이는 내가 미치지 않았다는 것이다'는 명언처럼 극도로 자의식적이고 연극적인 퍼스나. 콧수염과 기행으로 유명."}, "influences": ["페르메이르", "벨라스케스", "프로이트", "드 키리코"], "influenced": ["팝아트", "현대 광고 디자인", "뮤직비디오"], "major_works_ids": ["persistence-of-memory-1931"], "style_characteristics": ["극사   const artworks = BASE_DB.artworks.concat(LOCAL.new_artworks).map(a => {
    const ov = LOCAL.visited[a.id];
    if (ov) { a = Object.assign({}, a, { personal: Object.assign({}, a.personal, ov) }); }
    if (LOCAL.photos[a.id]) { a = Object.assign({}, a, { image: LOCAL.photos[a.id], has_my_photo: true }); }
    return a;
  });
  const artists = BASE_DB.artists.concat(LOCAL.new_artists);
  const visit_log = LOCAL.visit_log.concat(BASE_DB.visit_log || []);
  return { artworks, artists, history_events: BASE_DB.history_events || [], visit_log };
}

let todayIdx = -1;
function pickToday(force){
  const db = getDB();
  const all = db.artworks;
  if (force || todayIdx < 0){
    if (!force){ todayIdx = Math.floor(Date.now()/86400000) % all.length; }
    else { let n; do { n = Math.floor(Math.random()*all.length); } while(n===todayIdx); todayIdx = n; }
  }
  const a = all[todayIdx];
  const c = movColor(a.movement);
  document.getElementById('todayCard').innerHTML = `
    ${a.image ? `<img class="today-img" src="${a.image}" alt="${a.title.ko}" onerror="this.style.display='none'">` : ''}
    <div class="today-body">
      <div class="today-top"><span>🖼️</span><span class="today-label">TODAY'S PICK</span>
        <button class="today-refresh" onclick="pickToday(true);renderTodayOnly();event.stopPropagation()">🔀 다른 작품</button></div>
      <div class="today-movement" style="color:${c}">${a.movement}</div>
      <div class="today-title">${a.title.ko}</div>

function quickSearch(q){
  const results = document.getElementById('qsResults');
  const defaultView = document.getElementById('homeDefault');
  const query = q.trim().toLowerCase();
  if (!query){ results.innerHTML=''; defaultView.style.display='block'; return; }
  defaultView.style.display = 'none';
  const db = getDB();
  const found = db.artworks.filter(a => {
    const t1 = (a.title.ko||'').toLowerCase(), t2=(a.title.original||'').toLowerCase();
    const artist = getArtistName(a.artist_id).toLowerCase();
    const mov = (a.movement||'').toLowerCase();
    const tags = (a.tags||[]).join(' ').toLowerCase();
    return t1.includes(query)||t2.includes(query)||artist.includes(query)||mov.includes(query)||tags.includes(query);
  });
  if (!found.length){ results.innerHTML = `<div class="list-empty">🔎 "${q}" 검색 결과가 없습니다.<br>기록 탭에서 새로 추가해 보세요.</div>`; return; }

function renderTimeline(filter){
  const db = getDB();

    ...db.artworks.map(a => ({type:'art', year: parseInt(a.year_created)||0, data:a})),
    ...db.history_events.map(e => ({type:'hist', year:e.year, data:e})),
  ].filter(i => i.year>0).sort((a,b)=>a.year-b.year);

  const movs = ['all', ...new Set(db.artworks.map(a=>a.movement))];
  document.getElementById('timeline-filters').innerHTML = movs.map(m => `
    <span class="fchip ${m===filter?'on':''}" style="${m===filter?'background:'+movColor(m)+';border-color:'+movColor(m):''}" onclick="renderTimeline('${m}')">${m==='all'?'전체':m}</span>`).join('');

  const filtered = filter==='all' ? items : items.filter(i => (i.type==='art'?i.data.movement:i.data.movement)===filter || (i.type==='hist' && !i.data.movement));

/* ══════════════════════════════════════════
   IMAGE UPLOAD (신규 작품 추가 폼)
══════════════════════════════════════════ */
let addImageDataUrl = '';
function readFileAsDataUrl(file){
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')){ reject(new Error('이미지 파일이 아닙니다')); return; }
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function onAddImageSelect(e){ if (e.target.files[0]) handleAddImageFile(e.target.files[0]); }
function onAddImgDragOver(e){ e.preventDefault(); document.getElementById('addImgArea').style.borderColor='var(--accent)'; }
function onAddImgDragLeave(){ document.getElementById('addImgArea').style.borderColor=''; }
function onAddImgDrop(e){
  e.preventDefault();
  document.getElementById('addImgArea').style.borderColor='';
  const f = e.dataTransfer.files[0];
  if (f) handleAddImageFile(f);
}
function handleAddImageFile(file){
  readFileAsDataUrl(file).then(url => {
    addImageDataUrl = url;
    document.getElementById('add-image-preview').innerHTML =
      `<img src="${url}" style="width:100%;max-height:200px;object-fit:contain;border-radius:10px;background:var(--bg3)">`;
    showToast('📷 이미지 첨부됨');
  }).catch(() => showToast('⚠️ 이미지를 읽을 수 없습니다'));
}

/* ══════════════════════════════════════════
   ADD NEW ARTWORK (local, to be exported/synced)
══════════════════════════════════════════ */
function clearAddForm(){
  ['add-title-ko','add-title-orig','add-artist','add-year','add-movement','add-museum','add-summary','add-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-image').value = '';
  document.getElementById('add-image-preview').innerHTML = '';
  addImageDataUrl = '';
}
function submitAdd(){
  const titleKo = document.getElementById('add-title-ko').value.trim();
  const titleOrig = document.getElementById('add-title-orig').value.trim();
  const artist = document.getElementById('add-artist').value.trim();
  const year = document.getElementById('add-year').value.trim();
  const movement = document.getElementById('add-movement').value.trim();
  const museum = document.getElementById('add-museum').value.trim();
  const summary = document.getElementById('add-summary').value.trim();
  const memo = document.getElementById('add-memo').value.trim();
  if (!titleKo || !artist){ showToast('⚠️ 작품명과 화가명은 필수입니다'); return; }
  const id = 'user-' + Date.now();
  const artistId = 'user-artist-' + artist.replace(/\s+/g,'-').toLowerCase();
  if (!getDB().artists.find(a=>a.name.ko===artist)){
    LOCAL.new_artists.push({ id:artistId, name:{full:artist,ko:artist}, born:'', died:'', nationality:'', movement, bio:{early_life:'',career:'',personality:''} });
  }
  const artwork = {
    id, title:{original:titleOrig||titleKo, ko:titleKo}, artist_id:artistId, year_created:year, medium:'', dimensions:'',
    location:{museum, city:'', country:'', room:''}, movement,
    description:{summary, symbolism:'', technique:'', appreciation_points:[], mysteries:[]},
    historical_context:{period:'', year_context:'', social_background:''},
    personal:{visited: !!memo, visit_date: memo?new Date().toISOString().split('T')[0]:null, museum_visited: museum, memo},
    tags:[movement].filter(Boolean), archived_date:new Date().toISOString().split('T')[0], needs_enrichment:true,
    image: addImageDataUrl || '', image_pending_save: !!addImageDataUrl
  };
  LOCAL.new_artworks.push(artwork);
  if (memo){ LOCAL.visit_log.unshift({artwork_id:id, title:titleKo, artist, date:artwork.personal.visit_date, museum, memo}); }
  saveLocal();
  clearAddForm();
  showToast('✅ 로컬에 추가되었습니다 (내보내기 버튼으로 동기화하세요)');
  renderLog(); renderExplore(); renderRecentVisits();
}

/* ══════════════════════════════════════════
   ADD/CHANGE PHOTO on an EXISTING artwork (from detail panel)
══════════════════════════════════════════ */
function triggerPhotoPicker(artworkId){
  let input = document.getElementById('photoPickerInput');
  if (!input){
    input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.id = 'photoPickerInput'; input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.onchange = (e) => {
    if (!e.target.files[0]) return;
    readFileAsDataUrl(e.target.files[0]).then(url => {
      LOCAL.photos[artworkId] = url;
      saveLocal();
      openPanel(artworkId);
      renderExplore();
      showToast('📷 내 사진이 추가되었습니다 (내보내기로 동기화하세요)');
    }).catch(() => showToast('⚠️ 이미지를 읽을 수 없습니다'));
  };
  input.click();
}

function exportLocalChanges(){
  const payload = JSON.stringify(LOCAL, null, 2);
  const text = '다음은 Masterpiece 웹앱에서 로컬로 추가/수정된 내용입니다. archive_db.json에 병합해주세요:\n\n' + payload;
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('📋 클립보드에 복사됨 — Claude 채팅에 붙여넣으세요')).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('📋 클립보드에 복사됨'); } catch(e){ alert(text); }
  document.body.removeChild(ta);
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ══════════════════════════════════════════
   DETECT — photo → Claude Vision 식별
══════════════════════════════════════════ */
let apiKey = ''; let imgBase64 = ''; let imgMime = '';
function saveApiKey(){
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v){ alert('API Key를 입력해주세요.'); return; }
  apiKey = v; localStorage.setItem('masterpiece_api_key', v);
  document.getElementById('apiKeyInput').value = '●'.repeat(Math.min(v.length,18));
  const st = document.getElementById('keyStatus'); st.textContent = '✅ 저장됨'; st.style.color = 'var(--green)';
}
function onFileSelect(e){ if (e.target.files[0]) loadImg(e.target.files[0]); }
function onDragOver(e){ e.preventDefault(); document.getElementById('uploadArea').style.borderColor='var(--accent)'; }
function onDragLeave(){ document.getElementById('uploadArea').style.borderColor=''; }
function onDrop(e){ e.preventDefault(); document.getElementById('uploadArea').style.borderColor=''; const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) loadImg(f); }
function loadImg(file){
  const reader = new FileReader();
  reader.onload = function(ev){
    const url = ev.target.result; const parts = url.split(',');
    imgBase64 = parts[1]; imgMime = parts[0].match(/:(.*?);/)[1];
    document.getElementById('previewImg').src = url;
    document.getElementById('upload-section').classList.add('hidden');
    document.getElementById('preview-section').classList.remove('hidden');
    document.getElementById('result-section').innerHTML = '';
  };
  reader.readAsDataURL(file);
}
async function analyzeArtwork(){
  if (!apiKey){ alert('먼저 API Key를 저장해주세요.'); return; }
  if (!imgBase64){ alert('이미지를 먼저 선택해주세요.'); return; }
  const btn = document.getElementById('analyzeBtn'); btn.disabled = true; btn.textContent = '분석 중...';
  const prompt = '이 이미지를 분석해주세요. 미술 작품이라면 다음 JSON을 반환해주세요:\n{"isArtwork":true,"title":"작품명","artist":"화가명","year":"제작연도","movement":"미술사조","museum":"소장처","description":"작품설명(2~3문장)","trivia":"흥미로운사실(1~2문장)"}\n미술 작품이 아니면: {"isArtwork":false,"message":"설명"}\nJSON만 반환하세요.';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:'claude-opus-4-8', max_tokens:1024, messages:[{role:'user', content:[
        {type:'image', source:{type:'base64', media_type:imgMime, data:imgBase64}}, {type:'text', text:prompt}
      ]}] })
    });
    if (!resp.ok){ const err = await resp.json(); throw new Error(err.error?err.error.message:'API 오류 '+resp.status); }
    const data = await resp.json();
    const raw = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
    showDetectResult(JSON.parse(raw));
  } catch(e){
    document.getElementById('result-section').innerHTML = `<div class="result-box" style="color:var(--red)">⚠️ 분석 실패: ${e.message}</div>`;
  } finally { btn.disabled = false; btn.textContent = '🔍 작품 분석하기'; }
}
function showDetectResult(r){
  const sec = document.getElementById('result-section');
  if (!r.isArtwork){ sec.innerHTML = `<div class="result-box">🖼 ${r.message||'미술 작품을 인식할 수 없습니다.'}</div>`; return; }
  sec.innerHTML = `<div class="result-box">
    <div style="font-size:1.05rem;font-weight:800">${r.title||''}</div>
    <div style="font-size:.85rem;color:var(--accent);margin-bottom:8px">${r.artist||''} · ${r.year||''} · ${r.movement||''}</div>
    <div style="font-size:.82rem;color:var(--text2);line-height:1.7;margin-bottom:8px">${r.description||''}</div>
    ${r.trivia?`<div style="font-size:.78rem;color:var(--gold);border-left:3px solid var(--gold);padding-left:10px">💡 ${r.trivia}</div>`:''}
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="prefillFromDetect(${JSON.stringify(r).replace(/"/g,'&quot;')})">기록 탭에서 아카이빙하기 →</button>
  </div>`;
}
function prefillFromDetect(r){
  switchTab('log', document.querySelector('[data-s="log"]'));
  document.getElementById('add-title-ko').value = r.title||'';
  document.getElementById('add-artist').value = r.artist||'';
  document.getElementById('add-year').value = r.year||'';
  document.getElementById('add-movement').value = r.movement||'';
  document.getElementById('add-museum').value = r.museum||'';
  document.getElementById('add-summary').value = r.description||'';
}

init();
</script>
